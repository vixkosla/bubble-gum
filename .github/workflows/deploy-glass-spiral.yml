name: Deploy variant/glass-spiral to Netlify

on:
  push:
    branches: [variant/glass-spiral]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - run: npx netlify-cli deploy --prod --dir=dist --site ${{ secrets.NETLIFY_SITE_GLASS_SPIRAL }} --auth ${{ secrets.NETLIFY_AUTH_TOKEN }}
